services:
  nginx:
    image: nginx:latest
    container_name: nginx-container
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network

  app:
    image: shoaibdevops1/express-app:1.0
    container_name: express-app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
